services:
  # ── Backend (FastAPI) ──────────────────────────────────────────────────────
  - type: web
    name: data-manager-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    region: oregon
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: data-manager-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: EPHEMERAL_STORAGE
        value: "false"
      - key: CLEAR_ON_STARTUP
        value: "false"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      # Allow requests from the frontend — update if you add a custom domain
      - key: CORS_ORIGINS
        value: https://data-manager-frontend.onrender.com

  # ── Frontend (React / Vite static site) ───────────────────────────────────
  - type: web
    name: data-manager-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    autoDeploy: true
    routes:
      # React Router — all paths fall through to index.html
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    envVars:
      # Points the API client at the backend service
      - key: VITE_API_URL
        value: https://data-manager-backend.onrender.com

# ── PostgreSQL ─────────────────────────────────────────────────────────────
databases:
  - name: data-manager-db
    databaseName: datamanagerdb
    user: datamanager
    plan: starter
    postgresMajorVersion: 15
